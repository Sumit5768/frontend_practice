<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>audio and video</title>
    <style>
        h1{
              color: red;
            text-align: center;
    
          
        }
        video{
            width: 800px;height: 500px;
            
        }
        body{
            background-color: rgb(211, 229, 233);
        }
    </style>
</head>
<body>
    <h1>AUDIO</h1>
    <audio controls loop >
        <source src="audio/Tu Hi Disda 8K Video _ Bhooth Bangla _ Akshay Kumar & Wamiqa Gabbi _ Pritam, Arijit Singh, Nikhita G.mp3" type="audio/mpeg">
    </audio>
    <br>
    <h1>vedio</h1>
    <video controls loop muted autoplay >
        <source src="vedio/Tu Hi Disda 8K Video  Bhooth Bangla  Akshay Kumar .mp4" type="video/mp4">
    </video>
</body>
</html>
