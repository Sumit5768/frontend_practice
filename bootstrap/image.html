<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
  <h2>Rounded Corners</h2>
  <p>The .rounded class adds rounded corners to an image:</p>            
  <img src="/HTML/img/demo/1.jpg" class="rounded" alt="image not found" width="304" height="236"> 
</div>
<div class="container mt-3">
  <h2>Rounded Circle</h2>
  <p>The .rounded-circle class adds rounded corners to an image:</p>            
  <img src="/HTML/img/demo/1.jpg" class="rounded-circle" alt="image not found" width="304" height="236"> 
</div>
<div class="container mt-3">
  <h2>image thumnail</h2>
  <img src="/HTML/img/demo/1.jpg" class="img-thumbnail" alt="image not found" width="304" height="236"> 
</div>

<div class="container mt-3">
  <h2>image thumnail</h2>
  <img src="/HTML/img/demo/1.jpg" class="float-start" alt="image not found" width="304" height="236"> 
</div>
<div class="container mt-3">
  <img src="/HTML/img/demo/1.jpg" class="float-end" alt="image not found" width="304" height="236"> 
</div>


</body>
</html>
